<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>THE GATE</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: black;
        font-family: monospace;
        color: #00ff88;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        overflow: hidden;
      }

      .backgroundGlow {
        position: absolute;
        width: 300px;
        height: 300px;
        background: #00ff88;
        filter: blur(150px);
        opacity: 0.1;
      }

      .container {
        width: 100%;
        max-width: 420px;
        padding: 30px;
        border: 1px solid #00ff88;
        border-radius: 25px;
        text-align: center;
        background: rgba(0, 0, 0, 0.9);
        box-shadow: 0 0 25px #00ff88;
        position: relative;
        z-index: 2;
        animation: appear 2s ease;
      }

      h1 {
        font-size: 42px;
        margin-bottom: 20px;
        line-height: 1.3;
      }

      p {
        font-size: 16px;
        line-height: 1.8;
        margin-bottom: 35px;
        color: #b8ffd8;
      }

      a {
        display: inline-block;
        padding: 14px 35px;
        border: 1px solid #00ff88;
        border-radius: 12px;
        text-decoration: none;
        color: #00ff88;
        font-size: 18px;
        transition: 0.3s;
        animation: pulse 2s infinite;
      }

      a:hover {
        background: #00ff88;
        color: black;
        box-shadow: 0 0 20px #00ff88;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.05);
        }

        100% {
          transform: scale(1);
        }
      }

      @keyframes appear {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <div class="backgroundGlow"></div>

    <div class="container">
      <h1>THE GATE IS OPEN</h1>

      <p>Signal ini tidak ditujukan untuk semua orang</p>

      <a
        href="https://docs.google.com/forms/d/e/1FAIpQLSc4GVD9qae-yRqekugz4RhUy0XIUXSWEgBPi5fl0Gx4rSFZbw/viewform?usp=header"
        target="_blank"
      >
        ENTER
      </a>
    </div>
  </body>
</html>
